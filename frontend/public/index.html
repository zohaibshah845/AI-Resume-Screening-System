<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Resume Screener – Classic Edition</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #c0c0c0;  /* retro grey background */
      font-family: 'Courier New', 'Lucida Sans Typewriter', monospace;
      padding: 40px 20px;
    }

    /* classic container – beige paper feel */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      background: #fdf8e7;
      border: 3px solid #6b4c3b;
      box-shadow: 8px 8px 0px 0px #3e2a21;
      padding: 30px 35px 40px 35px;
    }

    /* title */
    h1 {
      font-family: 'Times New Roman', Georgia, serif;
      font-size: 2.4rem;
      letter-spacing: -0.5px;
      color: #2d2b1f;
      border-bottom: 3px double #b87c4f;
      display: inline-block;
      margin-bottom: 30px;
      padding-bottom: 8px;
      text-transform: uppercase;
      font-weight: bold;
    }

    /* classic form groups */
    .form-group {
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-weight: bold;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      margin-bottom: 10px;
      color: #3b2a1f;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* textarea like old typewriter */
    textarea {
      width: 100%;
      padding: 14px;
      background: #fffff0;
      border: 2px solid #7a5a4a;
      font-family: 'Courier New', monospace;
      font-size: 0.9rem;
      line-height: 1.4;
      resize: vertical;
      box-shadow: inset 2px 2px 4px rgba(0,0,0,0.05);
    }

    /* file input styling – classic plain */
    .file-area {
      background: #f3efdf;
      padding: 12px;
      border: 2px dashed #8b694e;
      margin-top: 6px;
    }

    input[type="file"] {
      font-family: 'Courier New', monospace;
      background: #fff6e8;
      padding: 6px;
      width: 100%;
      border: 1px solid #b2977e;
    }

    .file-hint {
      font-size: 0.8rem;
      color: #5f4c38;
      margin-top: 8px;
      font-style: italic;
    }

    /* classic button */
    button {
      background: #e9dbc9;
      border: 2px solid #5e3e2b;
      color: #2c2118;
      padding: 10px 28px;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      font-size: 1.1rem;
      cursor: pointer;
      box-shadow: 3px 3px 0px 0px #826b54;
      transition: 0.1s linear;
      margin-top: 8px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    button:active {
      transform: translate(2px, 2px);
      box-shadow: 1px 1px 0px 0px #826b54;
    }

    /* classic results table */
    .results-section {
      margin-top: 40px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: #fffef7;
      font-family: 'Courier New', monospace;
      margin-top: 12px;
    }

    th {
      background: #dac09a;
      border: 2px solid #5a3f2c;
      padding: 12px 10px;
      font-weight: bold;
      text-transform: uppercase;
      font-size: 0.85rem;
      letter-spacing: 1px;
      text-align: left;
    }

    td {
      border: 2px solid #c9af87;
      padding: 10px;
      font-size: 0.9rem;
    }

    tr:nth-child(even) {
      background-color: #f7efdf;
    }

    .score {
      font-weight: bold;
      font-family: monospace;
    }

    hr {
      border: none;
      border-top: 2px dotted #be9e78;
      margin: 20px 0;
    }

    .footer-note {
      margin-top: 30px;
      font-size: 0.7rem;
      text-align: center;
      font-family: monospace;
      color: #7f674f;
      border-top: 1px dashed #cfb387;
      padding-top: 18px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>📇 AI RESUME SCREENER</h1>

  <!-- Job description area -->
  <div class="form-group">
    <label>📄 Job Description (paste text here)</label>
    <textarea rows="5" id="jobDesc" placeholder="e.g. python developer with experience in flask, rest apis and database degree in software engineering and cgpa >4">python developer with experience in flask, rest apis and database degree in software engineering and cgpa >4</textarea>
  </div>

  <!-- Resumes upload classic area -->
  <div class="form-group">
    <label>📂 Resumes (PDF, DOCX, TXT – multiple allowed)</label>
    <div class="file-area">
      <input type="file" id="resumeFiles" multiple accept=".pdf,.docx,.txt">
      <div class="file-hint">▼ Selected files will appear below. (Demo simulation)</div>
    </div>
  </div>

  <!-- Simulated selected file list (classic style) -->
  <div id="selectedFilesList" style="margin: 12px 0 6px 12px; font-size:0.85rem; font-family:monospace; color:#4e3a28;"></div>

  <button id="screenBtn">📠 SCREEN RESUMES</button>

  <!-- results table -->
  <div class="results-section" id="resultsArea" style="display: none;">
    <hr>
    <table id="rankTable">
      <thead>
        <tr><th>Rank</th><th>Resume Filename</th><th>Similarity Score</th></tr>
      </thead>
      <tbody id="tableBody">
        <!-- dynamic rows will appear -->
      </tbody>
    </table>
  </div>
  <div class="footer-note">
    🖹 classic tf‑idf + cosine similarity — iub software engineering project
  </div>
</div>

<script>
  // Simulate classic ranking – demo data matches the image example
  // In a real implementation you would send files to backend. 
  // This provides the exact classic look with interactive demo data.

  const fileInput = document.getElementById('resumeFiles');
  const selectedDiv = document.getElementById('selectedFilesList');
  const screenBtn = document.getElementById('screenBtn');
  const resultsArea = document.getElementById('resultsArea');
  const tableBody = document.getElementById('tableBody');

  // update selected files preview (classic simple text)
  function updateSelectedList() {
    const files = fileInput.files;
    if (files.length === 0) {
      selectedDiv.innerHTML = '';
      return;
    }
    let html = '<span style="background:#e9dbc9; padding:4px 8px;">📎 selected:</span> ';
    for (let i = 0; i < files.length; i++) {
      html += `<span style="background:#fff0db; margin:2px; padding:2px 6px; border:1px solid #b4916b;">${files[i].name}</span> `;
    }
    selectedDiv.innerHTML = html;
  }

  fileInput.addEventListener('change', updateSelectedList);

  // function to simulate ranking – based on job description input (just for demo consistency)
  // to match the classic image: shows CV - Fatima Batool.pdf with score 82, also add extra examples.
  function simulateRanking() {
    const jobText = document.getElementById('jobDesc').value;
    const files = fileInput.files;
    let resumeNames = [];
    if (files.length === 0) {
      // default demo set if no files chosen (so that table always appears with classic example)
      resumeNames = ['CV - Fatima Batool.pdf', 'Ali_Resume.pdf', 'Sara_Software_Engineer.docx', 'Hamza_Backend.pdf'];
    } else {
      for (let i = 0; i < files.length; i++) {
        resumeNames.push(files[i].name);
      }
    }
    // generate dummy similarity scores but coherent: first gets 82, rest vary based on keyword "python/flask"
    const jobLower = jobText.toLowerCase();
    let scores = [];
    for (let name of resumeNames) {
      let base = 0;
      if (jobLower.includes('python')) base += 25;
      if (jobLower.includes('flask')) base += 20;
      if (jobLower.includes('database')) base += 15;
      if (jobLower.includes('software engineering')) base += 18;
      if (name.toLowerCase().includes('fatima')) base += 22;   // to get 82+ 
      if (name.toLowerCase().includes('ali')) base += 12;
      if (name.toLowerCase().includes('sara')) base += 30;
      if (name.toLowerCase().includes('hamza')) base += 18;
      let finalScore = Math.min(98, Math.max(25, base + (Math.floor(Math.random() * 12) + 5)));
      if (name === 'CV - Fatima Batool.pdf') finalScore = 82;
      scores.push(finalScore);
    }
    // create ranked array
    let ranked = resumeNames.map((name, idx) => ({ name, score: scores[idx] }));
    ranked.sort((a,b) => b.score - a.score);
    
    // populate table
    tableBody.innerHTML = '';
    for (let i = 0; i < ranked.length; i++) {
      const row = tableBody.insertRow();
      const rankCell = row.insertCell(0);
      const nameCell = row.insertCell(1);
      const scoreCell = row.insertCell(2);
      rankCell.textContent = i+1;
      nameCell.textContent = ranked[i].name;
      scoreCell.textContent = ranked[i].score;
      scoreCell.className = 'score';
    }
    resultsArea.style.display = 'block';
  }

  screenBtn.addEventListener('click', () => {
    simulateRanking();
  });

  // optional: initial default display like classic preview (but hidden until button)
  // but we can prefill the demo selected list if any file preload? 
  // for better UX: if there are no files, still show demo table after first click.
  // also show a classic alert if needed? no, keep silent.
  // preload demo list (to match image look)
  window.addEventListener('DOMContentLoaded', () => {
    // set dummy file list display as if 'CV - Fatima Batool.pdf' is selected (classic style)
    // we simulate the exact classic look: the image showed one file chosen
    const dummyFileList = [
      { name: 'CV - Fatima Batool.pdf' }
    ];
    // we can manually show selected files preview
    selectedDiv.innerHTML = '<span style="background:#e9dbc9; padding:4px 8px;">📎 selected:</span> <span style="background:#fff0db; margin:2px; padding:2px 6px; border:1px solid #b4916b;">CV - Fatima Batool.pdf</span>';
    // but file input remains empty — but for classic demonstration we make it consistent:
    // we also add a dataTransfer hack? not needed; we keep the manual preview for classic style.
    // when screen button pressed we respect fileInput if files exist; else fallback to demo set includes Fatima
    // adjust simulateRanking to recognise that we want to see Fatima with 82 even without actual file object.
    // The override inside simulateRanking already handles default set.
  });
</script>
</body>
</html>
